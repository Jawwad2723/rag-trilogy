name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry
        run: |
          curl -sSL https://install.python-poetry.org | python3 -
          export PATH="$HOME/.local/bin:$PATH"

      - name: Configure Poetry
        run: poetry config virtualenvs.create false

      - name: Install Dependencies
        run: poetry install --no-interaction --no-ansi

      - name: Run Mypy (Strict Type Safety)
        run: poetry run mypy --strict src/ --ignore-missing-imports

      - name: Run Bandit (Security Linter)
        run: poetry run bandit -r src/ -ll

      - name: Run Tests (Coverage Gate 80%)
        run: poetry run pytest --cov=src --cov-report=term-missing --cov-fail-under=80
        env:
          OPENAI_API_KEY: "dummy-test-key"
          ANTHROPIC_API_KEY: "dummy-test-key"
